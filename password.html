<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - DevKit</title>
    <meta name="description" content="Generate strong and secure passwords.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">DevKit</a>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation">☰</button>
            <div class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="password.html">Password Generator</a>
                <a href="counter.html">Word Counter</a>
                <a href="textcase.html">Text Converter</a>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 3rem;">
        <section class="card" id="password-generator">
            <h2>Password Generator</h2>
            <div class="input-group">
                <label for="pwd-length">Length: <span id="pwd-length-val">12</span></label>
                <input type="range" id="pwd-length" min="4" max="32" value="12">
            </div>
            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="pwd-numbers" checked>
                    Include Numbers
                </label>
                <label>
                    <input type="checkbox" id="pwd-symbols" checked>
                    Include Symbols
                </label>
            </div>
            <div class="output-group">
                <input type="text" id="pwd-output" readonly placeholder="Generated password">
                <button id="pwd-copy" class="btn btn-secondary">Copy</button>
            </div>
            <button id="pwd-generate" class="btn btn-primary">Generate</button>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-info">
                <p>Built By : Durga Rohith</p>
                <p>Email : durgarohith23@gmail.com</p>
            </div>
            <a href="https://digitalheroesco.com" class="btn btn-footer" target="_blank" rel="noopener noreferrer">Built for Digital Heroes</a>
        </div>
    </footer>

    <script src="js/nav.js"></script>
    <script src="js/password.js"></script>
</body>
</html>
